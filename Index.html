<title>TOEIC 700 單字卡</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  :root {
    --bg:          #F5F0E8;
    --surface:     #EDE7D9;
    --border:      #D6C9B0;
    --deep:        #3D2F1F;
    --mid:         #7A6248;
    --muted:       #A89880;
    --accent:      #B5714A;
    --accent-soft: #E8C9B0;
    --sage:        #7D9B76;
    --sage-soft:   #D4E4D2;
    --sand:        #C9AA7C;
    --sand-soft:   #F0E4CC;
    --white:       #FDFAF5;
  }
  html, body { height: 100%; background: var(--bg); font-family: Georgia, 'Times New Roman', serif; color: var(--deep); }
  #app { max-width: 480px; margin: 0 auto; min-height: 100vh; display: flex; flex-direction: column; }

  /* header */
  .header { padding: 24px 20px 16px; border-bottom: 1px solid var(--border); }
  .header-eyebrow { font-size: 10px; letter-spacing: 3px; color: var(--muted); text-transform: uppercase; margin-bottom: 3px; }
  .header-row { display: flex; justify-content: space-between; align-items: flex-end; }
  .header-title { font-size: 28px; font-weight: bold; color: var(--deep); letter-spacing: -0.5px; }
  .header-stats { text-align: right; font-size: 12px; color: var(--muted); line-height: 1.8; }
  .header-stats strong { color: var(--deep); }
  .header-stats .streak { color: var(--accent); }
  .progress-bar-wrap { margin-top: 12px; }
  .progress-bar-label { display: flex; justify-content: space-between; font-size: 11px; color: var(--muted); margin-bottom: 4px; }
  .progress-bar-track { height: 4px; background: var(--border); border-radius: 2px; }
  .progress-bar-fill { height: 100%; background: var(--accent); border-radius: 2px; transition: width .4s ease; }

  /* tabs */
  .tabs { display: flex; border-bottom: 1px solid var(--border); }
  .tab-btn { flex: 1; padding: 13px; border: none; background: transparent; font-family: inherit; font-size: 14px; cursor: pointer; border-bottom: 2px solid transparent; color: var(--muted); letter-spacing: .3px; }
  .tab-btn.active { color: var(--accent); border-bottom-color: var(--accent); font-weight: 700; }

  /* content */
  .content { flex: 1; padding: 20px 20px 48px; overflow-y: auto; }

  /* pills */
  .pills { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 18px; }
  .pill { padding: 5px 13px; border-radius: 20px; border: 1.5px solid var(--border); background: transparent; color: var(--muted); font-size: 12px; font-family: inherit; cursor: pointer; letter-spacing: .3px; transition: all .15s; }
  .pill.active-sage   { border-color: var(--sage);   background: var(--sage-soft);   color: var(--sage);   font-weight: 700; }
  .pill.active-sand   { border-color: var(--sand);   background: var(--sand-soft);   color: #8B6914;       font-weight: 700; }
  .pill.active-accent { border-color: var(--accent); background: var(--accent-soft); color: var(--accent); font-weight: 700; }
  .pill.active-mid    { border-color: var(--mid);    background: var(--surface);     color: var(--mid);    font-weight: 700; }
  .pill.active-deep   { border-color: var(--deep);   background: var(--surface);     color: var(--deep);   font-weight: 700; }

  /* card counter */
  .card-counter { text-align: center; font-size: 12px; color: var(--muted); letter-spacing: 1px; margin-bottom: 10px; }

  /* flashcard */
  .flashcard { background: var(--white); border: 1px solid var(--border); border-radius: 16px; min-height: 226px; padding: 30px 24px; cursor: pointer; display: flex; flex-direction: column; align-items: center; justify-content: center; box-shadow: 0 2px 12px rgba(61,47,31,.07); user-select: none; position: relative; transition: box-shadow .2s; }
  .flashcard:active { box-shadow: 0 1px 6px rgba(61,47,31,.1); }
  .level-badge { position: absolute; top: 13px; right: 13px; font-size: 10px; font-weight: 700; border-radius: 6px; padding: 2px 8px; letter-spacing: .5px; }
  .lv-400 { background: var(--sage-soft);   color: var(--sage); }
  .lv-600 { background: var(--sand-soft);   color: #8B6914; }
  .lv-800 { background: var(--accent-soft); color: var(--accent); }
  .lv-990 { background: var(--surface);     color: var(--mid); }
  .card-front { text-align: center; }
  .card-pos { font-size: 12px; color: var(--muted); margin-bottom: 6px; font-style: italic; }
  .card-word { font-size: 38px; font-weight: bold; color: var(--deep); letter-spacing: 1px; margin-bottom: 18px; }
  .card-hint { font-size: 11px; color: var(--border); letter-spacing: 2px; }
  .card-back { text-align: center; width: 100%; }
  .card-back .card-word { font-size: 22px; margin-bottom: 6px; }
  .card-zh { display: inline-block; background: var(--accent-soft); color: var(--accent); font-size: 16px; font-weight: 700; padding: 4px 16px; border-radius: 8px; margin-bottom: 14px; }
  .card-example { background: var(--surface); border-radius: 10px; padding: 11px 14px; font-size: 13px; color: var(--mid); line-height: 1.7; text-align: left; border-left: 3px solid var(--border); }

  /* buttons */
  .btn-row { display: flex; gap: 11px; margin-top: 14px; }
  .btn { flex: 1; padding: 15px; border-radius: 12px; font-family: inherit; font-size: 14px; cursor: pointer; letter-spacing: .3px; transition: opacity .15s; }
  .btn:active { opacity: .8; }
  .btn-pass { border: 1.5px solid var(--border); background: var(--white); color: var(--muted); }
  .btn-know { border: none; background: var(--accent); color: #fff; font-weight: 700; }
  .card-note { text-align: center; font-size: 11px; color: var(--border); margin-top: 12px; letter-spacing: .5px; }

  /* grammar */
  .gram-dots { display: flex; gap: 7px; justify-content: center; margin-bottom: 18px; }
  .gram-dot { height: 8px; border-radius: 4px; border: none; background: var(--border); cursor: pointer; padding: 0; transition: all .2s; }
  .gram-dot.active { background: var(--accent); width: 24px !important; }
  .gram-tag { font-size: 11px; font-weight: 700; padding: 3px 10px; border-radius: 6px; letter-spacing: .5px; }
  .tag-時態 { background: var(--accent-soft); color: var(--accent); }
  .tag-文法 { background: var(--sage-soft);   color: var(--sage); }
  .tag-子句 { background: var(--sand-soft);   color: #8B6914; }
  .tag-詞性 { background: var(--surface);     color: var(--mid); }
  .gram-title { font-size: 17px; font-weight: bold; color: var(--deep); }
  .gram-header { display: flex; align-items: center; gap: 9px; margin-bottom: 13px; }
  .gram-rule { background: var(--white); border: 1px solid var(--border); border-radius: 12px; padding: 15px 17px; font-size: 14px; color: var(--mid); line-height: 1.8; margin-bottom: 12px; }
  .gram-toeic { background: var(--sand-soft); border-radius: 10px; padding: 12px 15px; margin-bottom: 12px; border-left: 3px solid var(--sand); }
  .gram-toeic-label { font-size: 10px; font-weight: 700; color: #8B6914; margin-bottom: 4px; letter-spacing: 1px; text-transform: uppercase; }
  .gram-toeic-text { font-size: 13px; color: var(--mid); }
  .gram-ex-label { font-size: 10px; color: var(--muted); letter-spacing: 1.5px; text-transform: uppercase; margin-bottom: 7px; }
  .gram-ex { background: var(--white); border: 1px solid var(--border); border-radius: 10px; padding: 11px 13px; margin-bottom: 6px; }
  .gram-ex-en { font-size: 14px; color: var(--deep); margin-bottom: 2px; }
  .gram-ex-zh { font-size: 12px; color: var(--muted); }
  .gram-tip { background: var(--sage-soft); border-radius: 10px; padding: 13px 15px; border-left: 3px solid var(--sage); margin-bottom: 22px; }
  .gram-tip-label { font-size: 10px; font-weight: 700; color: var(--sage); margin-bottom: 5px; letter-spacing: 1px; text-transform: uppercase; }
  .gram-tip-text { font-size: 13px; color: var(--mid); line-height: 1.9; white-space: pre-line; }
  .gram-nav { display: flex; gap: 10px; }
  .btn-nav { flex: 1; padding: 13px; border-radius: 12px; font-family: inherit; font-size: 14px; cursor: pointer; transition: opacity .15s; }
  .btn-nav:active { opacity: .8; }
  .btn-nav-prev { border: 1.5px solid var(--border); background: transparent; color: var(--mid); }
  .btn-nav-prev:disabled { color: var(--border); cursor: default; }
  .btn-nav-next { border: none; background: var(--accent); color: #fff; font-weight: 700; }
  .btn-nav-next:disabled { background: var(--surface); color: var(--border); cursor: default; }
  .gram-page { text-align: center; font-size: 11px; color: var(--border); margin-top: 10px; }
</style>

const GRAMMAR = [
  {
    tag:"時態", title:"現在完成式 vs 過去式",
    rule:"現在完成式（have/has + p.p.）強調到目前為止的結果或影響；過去式強調特定時間點發生的事。",
    toeic:"Part 5 常考：填入 has completed / completed 的選擇",
    examples:[
      { en:"The company has launched a new product.", zh:"公司已推出新產品。（結果影響至今）" },
      { en:"The company launched a new product last year.", zh:"公司去年推出了新產品。（特定時間）" },
      { en:"She has worked here since 2020.", zh:"她自 2020 年起就在這裡工作。（持續至今）" },
    ],
    tip:"since / for / already / yet / just → 現在完成式\nyesterday / last week / in 2020 → 過去式",
  },
  {
    tag:"文法", title:"分詞構句",
    rule:"用分詞（V-ing 或 p.p.）替代從屬子句，主詞必須與主要子句相同。",
    toeic:"Part 5、6 常考：句首空格填 Regarding / Having + p.p. 等",
    examples:[
      { en:"Having reviewed the report, the manager approved it.", zh:"審閱完報告後，經理批准了它。" },
      { en:"Located downtown, the office is easy to access.", zh:"位於市中心，辦公室很容易到達。" },
      { en:"Considering the budget, we chose a simpler option.", zh:"考量到預算，我們選擇了較簡單的方案。" },
    ],
    tip:"句首空格 + 逗號 → 通常填分詞構句\nConsidering / Regarding / Given + 名詞 是固定搭配",
  },
  {
    tag:"時態", title:"被動語態",
    rule:"be + p.p.，強調動作接受者而非執行者。是多益最高頻文法考點之一。",
    toeic:"Part 5 幾乎每套必考，注意時態與主動被動的判斷",
    examples:[
      { en:"The report was submitted on time.", zh:"報告準時提交了。" },
      { en:"All employees are required to attend.", zh:"所有員工都被要求出席。" },
      { en:"The meeting has been postponed to Friday.", zh:"會議已延期至星期五。" },
    ],
    tip:"主詞是「被做」某事 → 用被動語態\nbe + p.p. 組合：is sent / was approved / has been updated",
  },
  {
    tag:"文法", title:"不定詞 vs 動名詞",
    rule:"某些動詞後只能接不定詞（to V），某些只能接動名詞（V-ing），某些兩者皆可。",
    toeic:"Part 5 高頻考點：空格填 to + V 還是 V-ing",
    examples:[
      { en:"We plan to expand our business.", zh:"我們計劃擴展業務。（plan + to V）" },
      { en:"He suggested holding a meeting.", zh:"他建議召開一次會議。（suggest + V-ing）" },
      { en:"She enjoys attending conferences.", zh:"她喜歡參加研討會。（enjoy + V-ing）" },
    ],
    tip:"接 to V：plan, decide, want, expect, agree, refuse\n接 V-ing：enjoy, consider, avoid, suggest, finish, recommend\n兩者皆可：like, love, begin, continue, prefer",
  },
  {
    tag:"子句", title:"關係代名詞",
    rule:"who 修飾人；which 修飾物；that 兩者皆可（正式文件常用 who / which）。",
    toeic:"Part 6、7 閱讀理解，Part 5 填空常考",
    examples:[
      { en:"The employee who received the award was promoted.", zh:"獲獎的員工被晉升了。" },
      { en:"The report which was submitted last week needs revision.", zh:"上週提交的報告需要修改。" },
      { en:"The software that we installed has improved efficiency.", zh:"我們安裝的軟體提高了效率。" },
    ],
    tip:"空格後面是動詞 → 填 who / which / that（主格）\n空格後面是主詞 + 動詞 → 填 whom / which（受格）",
  },
  {
    tag:"詞性", title:"副詞位置與詞性判斷",
    rule:"副詞修飾動詞、形容詞或其他副詞，不修飾名詞（那是形容詞的工作）。",
    toeic:"Part 5 最常考詞性題：空格填形容詞還是副詞",
    examples:[
      { en:"The project was completed successfully.", zh:"專案成功地完成了。（副詞修飾動詞）" },
      { en:"She is an extremely capable manager.", zh:"她是一位極其能幹的經理。（副詞修飾形容詞）" },
      { en:"❌ She handled the situation successful.", zh:"❌ 錯誤：successful 是形容詞，不能修飾動詞" },
    ],
    tip:"空格 + 形容詞 / 動詞 → 填副詞（-ly）\n形容詞 + 空格 + 名詞 → 填形容詞\n看清楚空格前後是什麼詞性！",
  },
];

// ── state ──────────────────────────────────────────────────────────
const LV_ACTIVE = { all:"active-deep", 400:"active-sage", 600:"active-sand", 800:"active-accent", 990:"active-mid" };
let state = {
  tab: "flash",
  filterLv: "all",
  cardIdx: 0,
  flipped: false,
  known: JSON.parse(localStorage.getItem("toeic_known") || "{}"),
  streak: 0,
  todayCount: 0,
  gramIdx: 0,
};

function save() { try { localStorage.setItem("toeic_known", JSON.stringify(state.known)); } catch(e){} }

function getDeck() {
  const filtered = state.filterLv === "all" ? VOCAB : VOCAB.filter(v => v.lv === +state.filterLv);
  const unknown  = filtered.filter(v => !state.known[v.word]);
  return unknown.length > 0 ? unknown : filtered;
}

function render() {
  const app = document.getElementById("app");
  const deck = getDeck();
  const card = deck[state.cardIdx % deck.length];
  const total = VOCAB.length;
  const knownCount = Object.keys(state.known).length;
  const progress = Math.round(knownCount / total * 100);

  app.innerHTML = `
    <div class="header">
      <p class="header-eyebrow">多益衝刺計劃</p>
      <div class="header-row">
        <h1 class="header-title">TOEIC 700</h1>
        <div class="header-stats">
          <div>🔥 連續 <span class="streak">${state.streak}</span> 張</div>
          <div>今日 <strong>${state.todayCount}</strong> 個 &nbsp;·&nbsp; 已記 <strong>${knownCount}</strong></div>
        </div>
      </div>
      <div class="progress-bar-wrap">
        <div class="progress-bar-label"><span>整體進度</span><span>${knownCount} / ${total}</span></div>
        <div class="progress-bar-track"><div class="progress-bar-fill" style="width:${progress}%"></div></div>
      </div>
    </div>

    <div class="tabs">
      <button class="tab-btn ${state.tab==="flash"?"active":""}" onclick="switchTab('flash')">單字卡</button>
      <button class="tab-btn ${state.tab==="grammar"?"active":""}" onclick="switchTab('grammar')">文法重點</button>
    </div>

    <div class="content">
      ${state.tab === "flash" ? renderFlash(card, deck) : renderGrammar()}
    </div>
  `;
}

function renderFlash(card, deck) {
  const lvls = ["all","400","600","800","990"];
  const lvLabel = { all:"全部", 400:"400分", 600:"600分", 800:"800分", 990:"990分" };
  const pills = lvls.map(lv => {
    const active = state.filterLv === lv ? LV_ACTIVE[lv] : "";
    return `<button class="pill ${active}" onclick="setLv('${lv}')">${lvLabel[lv]}</button>`;
  }).join("");

  const lvClass = `lv-${card.lv}`;
  const cardBody = state.flipped
    ? `<div class="card-back">
         <div class="card-pos">${card.pos}</div>
         <div class="card-word">${card.word}</div>
         <div class="card-zh">${card.zh}</div>
         <div class="card-example">${card.ex}</div>
       </div>`
    : `<div class="card-front">
         <div class="card-pos">${card.pos}</div>
         <div class="card-word">${card.word}</div>
         <div class="card-hint">— 點擊翻面 —</div>
       </div>`;

  return `
    <div class="pills">${pills}</div>
    <p class="card-counter">${(state.cardIdx % deck.length) + 1} / ${deck.length}</p>
    <div class="flashcard" onclick="flipCard()">
      <span class="level-badge ${lvClass}">${card.lv}</span>
      ${cardBody}
    </div>
    <div class="btn-row">
      <button class="btn btn-pass" onclick="next(false)">還不熟</button>
      <button class="btn btn-know" onclick="next(true)">記住了 ✓</button>
    </div>
    <p class="card-note">記住的單字將從牌堆移除</p>
  `;
}

function renderGrammar() {
  const g = GRAMMAR[state.gramIdx];
  const dots = GRAMMAR.map((_, i) => {
    const active = i === state.gramIdx ? "active" : "";
    return `<button class="gram-dot ${active}" style="width:${i===state.gramIdx?24:8}px" onclick="setGram(${i})"></button>`;
  }).join("");

  const examples = g.examples.map(ex => `
    <div class="gram-ex">
      <div class="gram-ex-en">${ex.en}</div>
      <div class="gram-ex-zh">${ex.zh}</div>
    </div>
  `).join("");

  const prevDisabled = state.gramIdx === 0 ? "disabled" : "";
  const nextDisabled = state.gramIdx === GRAMMAR.length - 1 ? "disabled" : "";

  return `
    <div class="gram-dots">${dots}</div>
    <div class="gram-header">
      <span class="gram-tag tag-${g.tag}">${g.tag}</span>
      <span class="gram-title">${g.title}</span>
    </div>
    <div class="gram-rule">${g.rule}</div>
    <div class="gram-toeic">
      <div class="gram-toeic-label">多益考點</div>
      <div class="gram-toeic-text">${g.toeic}</div>
    </div>
    <div class="gram-ex-label">例句</div>
    ${examples}
    <div class="gram-tip">
      <div class="gram-tip-label">解題秘訣</div>
      <div class="gram-tip-text">${g.tip}</div>
    </div>
    <div class="gram-nav">
      <button class="btn-nav btn-nav-prev" onclick="setGram(${state.gramIdx-1})" ${prevDisabled}>← 上一則</button>
      <button class="btn-nav btn-nav-next" onclick="setGram(${state.gramIdx+1})" ${nextDisabled}>下一則 →</button>
    </div>
    <p class="gram-page">${state.gramIdx + 1} / ${GRAMMAR.length}</p>
  `;
}

// ── actions ────────────────────────────────────────────────────────
function switchTab(t) { state.tab = t; render(); }
function setLv(lv) { state.filterLv = lv; state.cardIdx = 0; state.flipped = false; render(); }
function setGram(i) { if (i < 0 || i >= GRAMMAR.length) return; state.gramIdx = i; render(); }
function flipCard() { state.flipped = !state.flipped; render(); }

function next(remember) {
  const deck = getDeck();
  if (remember) {
    const card = deck[state.cardIdx % deck.length];
    state.known[card.word] = true;
    state.todayCount++;
    state.streak++;
    save();
  } else {
    state.streak = 0;
  }
  state.flipped = false;
  state.cardIdx = (state.cardIdx + 1) % Math.max(getDeck().length, 1);
  render();
}

// init
render();
</script>
